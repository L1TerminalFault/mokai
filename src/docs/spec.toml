# =======================================================================
# MOKAI BUILD ENGINE — SPECIFICATION
# =======================================================================
# Single dependency: toml11. All paths resolve relative to the containing
# file's base_dir.

# -----------------------------------------------------------------------
# 1. PROJECT
# -----------------------------------------------------------------------
[project]
name = "my_project"                  # Required.
version = "1.0.0"                    # Optional.
license = "MIT"                      # Optional.
description = "High-performance creative tools"
homepage = "https://github.com/user/repo"
cpp_version = "c++23"                # Default if omitted: c++23.
version_from = { file = "include/version.h", pattern = "VERSION_ID ([0-9]+)" }
authors = ["Baba"]
include_dirs = ["include", "src/core/include"]

# Local: "./" or "../" prefix. Remote: "git:" prefix.
dependencies = [
    "./local/sub_module",
    "git:https://github.com/fmtlib/fmt.git",
]

# -----------------------------------------------------------------------
# 2. OPTIONS — boolean toggles, read via `options.<key>` in conditions
# -----------------------------------------------------------------------
[options]
BUILD_VULKAN_BACKEND = true
ENABLE_TELEMETRY = false

# -----------------------------------------------------------------------
# 3. EXPORT CONTRACT — what a consumer gets when this project is a dependency
# -----------------------------------------------------------------------
# NOTE: This is intentionally narrow. It is NOT environment validation
# (that's what the condition engine in [[block]] is for — see §5). This
# section answers exactly one question: "if another project depends on
# me, what C++ version does that consumer get built against?"
[compatibility]
min_cpp_version = "c++20"
preferred_cpp_version = "c++23"
# MARK (kept from original, judgment call): if you never plan to be
# depended on by another mokai project, this whole section is droppable.
# Keeping it because static/shared libs commonly are dependency targets,
# and a consumer needs to know the floor before depends_on resolution.

# -----------------------------------------------------------------------
# 4. GROUPS — named, reusable sets of source patterns
# -----------------------------------------------------------------------
# Replaces the old `file_group`. Sources only — no flags/defines here,
# that's what [[block]] is for (§5). One concept, one job.
[[group]]
name = "render_sources"
patterns = ["src/renderer/*.cpp", "src/renderer/vulkan/**/*.cpp"]

[[group]]
name = "shader_assets"
patterns = ["shaders/**/*.spv"]

# -----------------------------------------------------------------------
# 5. BLOCKS — conditional bundles of flags/defines/sources/deps/libs
# -----------------------------------------------------------------------
# Replaces property_group AND sources_if/flags_if/properties_if entirely.
# One mechanism: a named block with an optional condition, carrying any
# combination of the fields below. Reference it from a target with
# `blocks = ["@name"]`, or declare one inline+anonymous directly under a
# target (see §6) when it's only ever used once.
#
# Every field is optional — a block can be "just some flags", "just a
# conditional dependency", or all of the above at once.
[[block]]
name = "linux_strict_diagnostics"
condition = "os == linux && compiler == clang"
flags = ["-Wall", "-Wextra"]
defines = ["MOKAI_LINUX_BUILD=1", "DEBUG_GPU"]

[[block]]
name = "vulkan_backend"
condition = "options.BUILD_VULKAN_BACKEND == true"
sources = ["src/backend/vulkan.cpp", "src/backend/vulkan_pipeline.cpp"]
depends_on = ["volk"]

[[block]]
name = "telemetry_profiling"
condition = "compiler == gcc && options.ENABLE_TELEMETRY == true"
flags = ["-pg", "-fno-omit-frame-pointer"]

[[block]]
name = "shared_export"
condition = "target_type == shared_library"
defines = ["MOKAI_CORE_EXPORT=1"]

# -----------------------------------------------------------------------
# 6. HOOKS
# -----------------------------------------------------------------------
# MARK (unchanged from original — out of scope for this pass, but see the
# {{variable}} substitution proposal from earlier in this session: build_dir,
# target_name, changed_file. Worth its own follow-up, not bundled here.)
[[hook]]
name = "shader_compiler"
on = "pre_target_build"        # pre_build | post_build | pre_target_build | post_target_build | file_change
run = "./scripts/compile_shaders.sh"
target = "my_engine_core"
pattern = "shaders/**/*.glsl"

# -----------------------------------------------------------------------
# 7. TARGETS
# -----------------------------------------------------------------------
[target.my_engine_core]
type = "static_library"            # executable | static_library | shared_library
sources = ["src/main.cpp", "src/core.cpp", "@render_sources"]  # literal, glob, or @group
include_dirs = ["src/core/private"]
flags = ["-O3", "-march=native"]
system_libs = ["X11", "pthread", "dl", "m"]

blocks = [
    "@linux_strict_diagnostics",
    "@vulkan_backend",
    "@telemetry_profiling",
    "@shared_export",
]

# Sequential 5-step lookup: package:target, package/profile,
# local sibling, global sweep, package default_targets fallback.
depends_on = [
    "fmt",
    "local_dep:module_target",
    "external_dep/core_profile",
]

# Inline anonymous block — same schema as §5, just declared in place for
# a one-off condition you don't need to name or reuse elsewhere.
[[target.my_engine_core.block]]
condition = "arch == arm64"
flags = ["-mcpu=apple-m1"]

# -----------------------------------------------------------------------
# 8. CONDITION GRAMMAR
# -----------------------------------------------------------------------
# compiler, compiler_version, os, target_os, arch, target_type, config,
# options.<key>
# Operators: && || == != >= <= > 
# MARK (added, not requested): the original spec showed no grouping
# syntax. Worth confirming the condition engine actually supports
# parens for `(a || b) && c` — if not, that's a real gap, flagged
# during the earlier mokai/crow comparison too (crow has all/any/not()
# composites; this grammar as documented doesn't show an equivalent).

# -----------------------------------------------------------------------
# 9. EXPORTS — how this project looks to a consumer
# -----------------------------------------------------------------------
[exports]
default_targets = ["my_engine_core"]
include_dirs = ["include/public"]
defines_required = ["USING_MOKAI_ENGINE=1"]
defines_optional = ["MOKAI_ENABLE_ANALYTICS=1"]

[exports.profile.headless_runtime]
targets = ["my_engine_core"]

[exports.profile.full_suite]
targets = ["my_engine_core", "editor_companion_target"]

# -----------------------------------------------------------------------
# 10. OUTPUT
# -----------------------------------------------------------------------
[output]
directory = "./build_output"

[output.configs.debug]
enabled = true
subdir = "bin/debug"

[output.configs.release]
enabled = true
subdir = "bin/release"
